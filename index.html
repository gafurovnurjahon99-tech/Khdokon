<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0088cc">
    <title>Tg Dokon Online</title>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Asosiy stillar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Foydalanuvchi kartasi -->
    <header class="usercard" id="usercard">
        <span id="username">Yuklanmoqda...</span>
        <button class="admin-btn-icon" onclick="openAdmin()" aria-label="Boshqaruv paneli">⚙️</button>
    </header>

    <!-- Buyurtma holati paneli (dastlab yashirin) -->
    <section class="status-bar" id="status-bar" aria-live="polite" hidden>
        <span>Buyurtma: <b id="order-status-text">Kutilmoqda</b></span>
        <div class="status-dots">
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>
    </section>

    <!-- Qidiruv maydoni -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Mahsulot qidirish..." 
               oninput="searchProducts(this.value)" aria-label="Qidirish">
    </div>

    <!-- Kategoriyalar ro'yxati -->
    <nav class="categories" id="category-list" aria-label="Kategoriyalar"></nav>

    <!-- Asosiy mahsulotlar gridi -->
    <main class="container">
        <div class="inner" id="product-grid"></div>
    </main>

    <!-- Admin panel modal oynasi -->
    <div id="admin-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="admin-title" hidden>
        <div class="modal-content admin-box">
            <div class="admin-header">
                <h3 id="admin-title">Boshqaruv Paneli</h3>
                <button class="close-x" onclick="closeAdmin()" aria-label="Yopish">&times;</button>
            </div>
            <div class="admin-tabs" role="tablist">
                <button onclick="showTab('p-tab', this)" class="tab-link active" id="tab-products" role="tab" aria-selected="true">Mahsulotlar</button>
                <button onclick="showTab('c-tab', this)" class="tab-link" id="tab-categories" role="tab" aria-selected="false">Toifalar</button>
                <button onclick="showTab('o-tab', this)" class="tab-link" id="tab-orders" role="tab" aria-selected="false">Buyurtmalar</button>
                <button onclick="showTab('s-tab', this)" class="tab-link" id="tab-stats" role="tab" aria-selected="false">Statistika</button>
            </div>
            
            <!-- Mahsulotlar tabi -->
            <div id="p-tab" class="tab-body" role="tabpanel" aria-labelledby="tab-products">
                <div class="input-group">
                    <input type="text" id="p-name" placeholder="Mahsulot nomi">
                    <div class="price-group">
                        <input type="number" id="p-price" placeholder="Asosiy narx">
                        <input type="number" id="p-sale-price" placeholder="Chegirma narxi">
                    </div>
                    <select id="p-cat-select"></select>
                    <textarea id="p-desc" placeholder="Mahsulot tavsifi (ixtiyoriy)..." rows="3"></textarea>
                    <label class="file-label">
                        🖼 Rasm/GIF tanlash
                        <input type="file" id="p-image-input" accept="image/*" hidden>
                    </label>
                    <div id="image-preview" class="preview-box"></div>
                    <button id="main-admin-btn" class="add-btn-main" onclick="addNewProduct()">Onlayn saqlash</button>
                </div>
                <div id="admin-prod-list" class="scroll-list"></div>
            </div>

            <!-- Toifalar tabi -->
            <div id="c-tab" class="tab-body" role="tabpanel" aria-labelledby="tab-categories" hidden>
                <div class="input-group">
                    <input type="text" id="new-cat-input" placeholder="Yangi toifa nomi">
                    <button class="add-btn-main" onclick="addNewCategory()">Qo'shish</button>
                </div>
                <div id="admin-cat-list" class="scroll-list"></div>
            </div>

            <!-- Buyurtmalar tabi -->
            <div id="o-tab" class="tab-body" role="tabpanel" aria-labelledby="tab-orders" hidden>
                <div id="admin-orders-list" class="scroll-list">
                    <p class="loading-placeholder">Buyurtmalar yuklanmoqda...</p>
                </div>
            </div>

            <!-- Statistika tabi -->
            <div id="s-tab" class="tab-body" role="tabpanel" aria-labelledby="tab-stats" hidden>
                <div class="stats-grid">
                    <div class="stat-card">
                        Jami tushum: <span class="stat-value" id="total-revenue">0 so'm</span>
                    </div>
                    <div class="stat-card">
                        Buyurtmalar: <span class="stat-value" id="total-orders-count">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mahsulotni tez ko'rish modal oynasi -->
    <div id="quick-view-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="qv-title" hidden>
        <div class="modal-content quick-box">
            <button class="close-x" onclick="closeQuickView()" aria-label="Yopish">&times;</button>
            <img id="qv-img" src="" alt="" class="qv-image">
            <h2 id="qv-name" class="qv-name"></h2>
            <p id="qv-price" class="qv-price"></p>
            <p id="qv-desc" class="qv-desc"></p>
            <button id="qv-add-btn" class="add-btn-main">Savatga qo'shish</button>
        </div>
    </div>

    <!-- Savat vidjeti -->
    <div id="cart-widget" class="cart-widget" onclick="toggleCart()" role="button" tabindex="0" aria-label="Savatcha">
        <span>🛒 <span id="cart-count">0</span></span>
        <span id="cart-total-info">0 so'm</span>
    </div>

    <!-- Savat modal oynasi -->
    <div id="cart-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="cart-title" hidden>
        <div class="modal-content cart-box">
            <h3 id="cart-title">Savatcha</h3>
            <ul id="cart-items" class="cart-list-ui"></ul>
            <div class="total-summary">Jami: <span id="total-price-display">0</span> so'm</div>
            <textarea id="order-comment" placeholder="Buyurtma uchun izoh (manzil yoki telefon)..." rows="3"></textarea>
            <button class="checkout-btn" onclick="checkout()">Sotib olish</button>
            <button class="close-btn-text" onclick="toggleCart()">Yopish</button>
        </div>
    </div>

    <!-- Firebase va asosiy skript -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
